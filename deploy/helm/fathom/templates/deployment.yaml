apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fathom.fullname" . }}
  labels:
    {{- include "fathom.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "fathom.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if .Values.observability.prometheusScrape }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
        {{- end }}
      labels:
        {{- include "fathom.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.kms.serviceAccountName }}
      serviceAccountName: {{ .Values.kms.serviceAccountName }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: fathom
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "5000"
            {{- if .Values.database.url }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-db" (include "fathom.fullname" .)) .Values.database.existingSecret }}
                  key: DATABASE_URL
            {{- else }}
            - name: PGHOST
              value: {{ .Values.database.host | quote }}
            - name: PGPORT
              value: "{{ .Values.database.port }}"
            - name: PGDATABASE
              value: {{ .Values.database.name | quote }}
            - name: PGUSER
              value: {{ .Values.database.user | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-db" (include "fathom.fullname" .)) .Values.database.existingSecret }}
                  key: PGPASSWORD
            {{- end }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-core" (include "fathom.fullname" .)) .Values.secrets.existingSecret }}
                  key: JWT_SECRET
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-core" (include "fathom.fullname" .)) .Values.secrets.existingSecret }}
                  key: ENCRYPTION_KEY
            {{- if .Values.hipaa.enabled }}
            - name: HIPAA_MODE
              value: "true"
            - name: FATHOM_AI_DISABLED
              value: "true"
            {{- end }}
            - name: FATHOM_KMS_BACKEND
              value: {{ .Values.kms.backend | quote }}
            {{- if .Values.kms.keyId }}
            - name: FATHOM_KMS_KEY_ID
              value: {{ .Values.kms.keyId | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
