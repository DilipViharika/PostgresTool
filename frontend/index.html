<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#38bdf8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VIGIL" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <title>VIGIL — PostgreSQL Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@300;400;500;600&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- Pre-React loading indicator — visible until React hydrates the root -->
      <div id="pre-loader" style="
        position: fixed; inset: 0; z-index: 9999;
        background: #0a0d1e;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
        font-family: 'DM Sans', system-ui, sans-serif;
      ">
        <div style="position: relative; width: 52px; height: 52px;">
          <div style="
            position: absolute; inset: 0; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.06);
            border-top-color: #06b6d4;
            animation: vgl-spin 1s linear infinite;
          "></div>
          <div style="
            position: absolute; inset: 10px; border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(6,182,212,0.3);
          ">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/>
            </svg>
          </div>
        </div>
        <div style="color: #4a4e6a; font-size: 11px; letter-spacing: 0.12em; font-family: 'JetBrains Mono', monospace;">
          LOADING
        </div>
      </div>
      <style>
        @keyframes vgl-spin { to { transform: rotate(360deg); } }
      </style>
    </div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Global error fallback — catches fatal JS errors that prevent React from mounting -->
    <script>
      window.addEventListener('error', function(e) {
        // Only show fallback if React hasn't mounted yet (pre-loader still visible)
        var loader = document.getElementById('pre-loader');
        if (!loader) return;
        loader.innerHTML = '<div style="text-align:center;padding:40px;color:#f0f0ff;font-family:DM Sans,system-ui,sans-serif">' +
          '<div style="font-size:48px;margin-bottom:16px">⚠️</div>' +
          '<h3 style="font-size:16px;font-weight:600;margin-bottom:8px">Failed to load</h3>' +
          '<p style="font-size:13px;color:#6b7094;margin-bottom:20px">The app encountered an error during startup.</p>' +
          '<button onclick="location.reload()" style="padding:8px 20px;border-radius:8px;border:1px solid rgba(6,182,212,0.3);background:rgba(6,182,212,0.1);color:#06b6d4;cursor:pointer;font-size:13px;font-family:inherit">Reload Page</button>' +
          '</div>';
      });
    </script>
  </body>
</html>
