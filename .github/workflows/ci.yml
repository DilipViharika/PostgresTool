name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install all dependencies
        run: npm install --no-audit

      - name: Type check shared types
        run: cd shared/types && npx tsc --noEmit

      - name: Type check shared validators
        run: cd shared/validators && npx tsc --noEmit

      - name: Type check backend
        run: cd backend && npx tsc --noEmit

      - name: Type check frontend
        run: cd frontend && npx tsc --noEmit

  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install all dependencies
        run: npm install --no-audit

      - name: Lint frontend
        run: cd frontend && npx eslint src/ --max-warnings 50

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_API_URL: https://postgrestoolbackend.vercel.app

      - name: Check backend syntax
        run: node --check backend/server.js

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install all dependencies
        run: npm install --no-audit

      - name: Run frontend tests
        run: cd frontend && npm test -- --run --reporter=verbose

      - name: Run backend tests
        run: cd backend && npm test

  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          # Fail if any .env files with real values are committed
          if git ls-files | grep -E '\.env$|\.env\.local$|\.env\.production$' | grep -v '.example'; then
            echo "ERROR: Real .env files should not be committed!"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install all dependencies
        run: npm install --no-audit

      - name: Audit frontend dependencies
        run: cd frontend && npm audit --audit-level=high || true

      - name: Audit backend dependencies
        run: cd backend && npm audit --audit-level=high || true

  python:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install Python dependencies
        run: cd python && pip install -r requirements.txt

      - name: Lint with ruff
        run: cd python && pip install ruff && ruff check .

      - name: Run Python tests
        run: cd python && python -m pytest tests/ -v
