# .semgrep/fathom-rules.yml
# ─────────────────────────
# House SAST rules specific to FATHOM's architecture. Loaded by
# .github/workflows/security.yml alongside Semgrep's public rulesets.
#
# Philosophy: flag patterns that are safe in most codebases but wrong in
# ours — raw SQL concatenation of tenant IDs, missing pool-cleanup in async
# handlers, hard-coded admin flags, etc.

rules:
  - id: fathom-no-raw-tenant-interpolation
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Tenant IDs must be passed as query parameters ($1, $2, ...), never
      interpolated into raw SQL strings. Interpolation bypasses the
      parameterised-query protection in pg and is a multi-tenancy escape
      risk. Use `pool.query('... WHERE tenant_id = $1', [tenantId])`.
    patterns:
      - pattern-either:
          - pattern: |
              `... WHERE tenant_id = ${$T} ...`
          - pattern: |
              "... WHERE tenant_id = '" + $T + "' ..."

  - id: fathom-scim-auth-required
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      SCIM routers must be wrapped with `createScimAuth(pool)` before being
      mounted. An unauthenticated SCIM surface would leak directory data.
    patterns:
      - pattern: app.use('/scim/v2', $ROUTER)
      - pattern-not: app.use('/scim/v2', scimAuth, ...)
      - pattern-not: app.use('/scim/v2', gateRouter($POOL, $FEATURE, $ROUTER))

  - id: fathom-audit-log-no-direct-insert
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      Do not insert directly into audit_log_secure. Use appendAudit() from
      services/auditLogSecure.js so the hash-chain is maintained.
    patterns:
      - pattern-either:
          - pattern: |
              $POOL.query(`INSERT INTO ... audit_log_secure ...`, ...)
          - pattern: |
              $POOL.query("INSERT INTO ... audit_log_secure ...", ...)
    paths:
      exclude:
        - backend/services/auditLogSecure.js
        - backend/tests/

  - id: fathom-no-plaintext-token-logging
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Do not log the plaintext form of a SCIM or API token. Only the
      first 8 characters of the SHA-256 hash are safe to log. Check for
      accidental `console.log(token)` or `logger.info({ token })`.
    patterns:
      - pattern-either:
          - pattern: console.log(..., $TOKEN, ...)
          - pattern: logger.$METHOD({ ..., token: $TOKEN, ... }, ...)
      - metavariable-regex:
          metavariable: $TOKEN
          regex: '^(plaintext|rawToken|bearerToken|apiKey)$'

  - id: fathom-no-hardcoded-admin-bypass
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Admin bypass flags must be sourced from the users table, not
      hard-coded in middleware. Hard-coded bypasses break SOC 2 CC6.2.
    patterns:
      - pattern-either:
          - pattern: |
              if (req.user.email === "...") { ... req.isAdmin = true; ... }
          - pattern: |
              const SUPER_ADMINS = [ "..." ];

  - id: fathom-pool-release-in-finally
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      When calling pool.connect(), the client must be released in a
      finally block so errors thrown inside the try don't leak a
      connection from the pool.
    patterns:
      - pattern: |
          const $CLIENT = await $POOL.connect();
          ...
      - pattern-not-inside: |
          try { ... } finally { $CLIENT.release(); }
